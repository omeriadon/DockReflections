name: DockReflectionsSettings

options:
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor

targets:
  DockReflectionsSettings:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.omeriadon.DockReflectionsSettings
        PRODUCT_NAME: Dock Reflections
        PRODUCT_MODULE_NAME: DockReflectionsSettings
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Dock Reflections
        LSApplicationCategoryType: public.app-category.utilities

  DockReflectionsSettingsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: DockReflectionsSettings
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Dock Reflections.app/Contents/MacOS/Dock Reflections"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  DockReflectionsSettings:
    build:
      targets:
        DockReflectionsSettings: all
        DockReflectionsSettingsTests: [test]
    test:
      targets:
        - DockReflectionsSettingsTests
